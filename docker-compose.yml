services:
  api:
    build: .
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000
    environment:
      DATABASE_URL: sqlite:////data/finance.db
    volumes:
      - finance-data:/data
    ports:
      - "8000:8000"

  dashboard:
    build: .
    command: streamlit run app.py --server.address 0.0.0.0 --server.port 8501
    environment:
      DATABASE_URL: sqlite:////data/finance.db
    volumes:
      - finance-data:/data
    ports:
      - "8501:8501"

volumes:
  finance-data:
