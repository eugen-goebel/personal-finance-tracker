name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Ruff
        run: pip install -r requirements-dev.txt

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run tests with coverage
        run: pytest -v --cov=agents --cov=api --cov=db --cov-report=term-missing --cov-report=xml --cov-fail-under=80

      - name: Coverage summary
        if: always() && matrix.python-version == '3.12'
        run: |
          echo "### Coverage" >> "$GITHUB_STEP_SUMMARY"
          python -c "import xml.etree.ElementTree as ET; print(f\"Line coverage: {float(ET.parse('coverage.xml').getroot().get('line-rate'))*100:.1f}%\")" >> "$GITHUB_STEP_SUMMARY"

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Build and start the stack
        run: docker compose up -d --build

      - name: Wait for the API to respond
        run: |
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:8000/ >/dev/null; then echo "API is up"; exit 0; fi
            sleep 2
          done
          echo "API did not become healthy"
          docker compose logs
          exit 1

      - name: Check the dashboard health endpoint
        run: curl -fsS http://localhost:8501/_stcore/health

      - name: Tear down
        if: always()
        run: docker compose down
